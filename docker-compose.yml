services:
  backend:
    build: ./backend
    container_name: backend-container
    restart: always
    expose:
      - "8000"

  frontend:
    build: ./frontend
    container_name: frontend-container
    restart: always
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    container_name: nginx-container
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
